<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>
<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#333;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#555;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
}

.product{
background:white;
padding:15px;

display:inline-block;
width:200px;
box-shadow:0 0 5px #ccc;

}

button{
background:green;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

footer{
background:#333;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>My Shop</h1>
<p>Welcome to my online store</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="product">
<h3>Product 1</h3>
<p>Price: ₹500</p>
<button>Buy Now</button>
</div>

<div class="product">
<h3>Product 2</h3>
<p>Price: ₹800</p>
<button>Buy Now</button>
</div>

<div class="product">
<h3>Product 3</h3>
<p>Price: ₹1200</p>
<button>Buy Now</button>
</div>

</div>

<footer>
<p>© 2026 My Shop</p>
</footer>

</body>
</html>
